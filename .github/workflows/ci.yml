name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - integration/**
      - codex/**
      - feature/sqlite-persistence

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Audit dependencies
        run: npm run security:audit

      - name: Check character data is not tracked
        run: node scripts/check-no-character-data.mjs

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Test
        run: npm test
